<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}QuestLog{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/site.css" />
  </head>
  <body>
    <header class="shell-header">
      <div>
        <p class="eyebrow">Quest journal</p>
        <h1><a href="/">QuestLog</a></h1>
      </div>
      <p class="subtitle">Small, server-rendered, and honest about scope.</p>
    </header>

    {% if messages %}
      <section class="flash-stack">
        {% for message in messages %}
          <div class="flash flash-{{ message.tags|default:'info' }}">{{ message }}</div>
        {% endfor %}
      </section>
    {% endif %}

    <main class="shell-main">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
